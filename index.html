<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Primary meta description (English — default).
      The JS snippet at the bottom of <body> will swap this to Spanish
      if i18next has persisted "es" in localStorage, so crawlers and
      social-preview scrapers see the right language on first load.
    -->
    <meta
      id="meta-description"
      name="description"
      content="Geospatial Data Scientist with 10+ years of experience. Proficient in Python, GIS, Remote Sensing, and Machine Learning. Ph.D. candidate in Geomatics and Space Systems." />

    <!-- ── Canonical URL ────────────────────────────────────────────────────
         Tells search engines the authoritative URL for this page, preventing
         duplicate-content penalties if the site is ever mirrored.
    ──────────────────────────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://acoiman.github.io/" />

    <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp previews) ───────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://acoiman.github.io/" />
    <meta property="og:site_name" content="Abraham Coiman" />
    <meta
      id="og-title"
      property="og:title"
      content="Abraham Coiman — Geospatial Data Scientist" />
    <meta
      id="og-description"
      property="og:description"
      content="Geospatial Data Scientist with 10+ years of experience. Proficient in Python, GIS, Remote Sensing, and Machine Learning. Ph.D. candidate in Geomatics and Space Systems." />
    <meta
      property="og:image"
      content="https://acoiman.github.io/profile.webp" />
    <meta property="og:image:alt" content="Abraham Coiman profile photo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- ── Twitter / X Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://acoiman.github.io/" />
    <meta
      id="tw-title"
      name="twitter:title"
      content="Abraham Coiman — Geospatial Data Scientist" />
    <meta
      id="tw-description"
      name="twitter:description"
      content="Geospatial Data Scientist with 10+ years of experience. Proficient in Python, GIS, Remote Sensing, and Machine Learning. Ph.D. candidate in Geomatics and Space Systems." />
    <meta
      name="twitter:image"
      content="https://acoiman.github.io/profile.webp" />
    <meta name="twitter:image:alt" content="Abraham Coiman profile photo" />

    <!-- ── Favicon ───────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/webp" href="/profile.webp" />

    <!-- ── Stylesheets ───────────────────────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

    <!-- ── Google Fonts ──────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Page title ─────────────────────────────────────────────────────
         More descriptive than just the name — helps search-result snippets
         and browser-tab readability.
    ──────────────────────────────────────────────────────────────────────── -->
    <title>Abraham Coiman — Geospatial Data Scientist</title>
    <script type="module" crossorigin src="/assets/index-oh56pLc-.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C8gRTM7A.css">
  </head>
  <body>
    <div id="root"></div>

    <!--
      ── Language-aware meta description (runs before React hydrates) ────────
      Reads the persisted language from localStorage (written by i18next) and,
      if it is "es", swaps the meta description, OG, and Twitter tags to
      Spanish so that server-side scrapers / social-preview bots (which don't
      execute React) see the correct language from the very first byte.

      This is intentionally plain JS — no framework dependency — so it runs
      synchronously and is safe to place at the end of <body>.
    ─────────────────────────────────────────────────────────────────────────
    -->
    <script>
      (function () {
        var lang = localStorage.getItem("i18nextLng") || "en";
        // Normalise "es-AR", "es-419", etc. → "es"
        if (lang.startsWith("es")) {
          var esDesc =
            "Científico de datos geoespaciales con más de 10 años de experiencia. " +
            "Dominio de Python, SIG, Teledetección y Aprendizaje Automático. " +
            "Estudiante de doctorado en Geomática y Sistemas Espaciales.";
          var esTitle = "Abraham Coiman — Científico de Datos Geoespaciales";

          document
            .getElementById("meta-description")
            .setAttribute("content", esDesc);
          document.getElementById("og-title").setAttribute("content", esTitle);
          document
            .getElementById("og-description")
            .setAttribute("content", esDesc);
          document.getElementById("tw-title").setAttribute("content", esTitle);
          document
            .getElementById("tw-description")
            .setAttribute("content", esDesc);
          document.documentElement.setAttribute("lang", "es");
        }
      })();
    </script>
  </body>
</html>
